# netlify.toml
# Place this file in the ROOT of your Netlify project folder

[build]
  publish = "."
  functions = "netlify/functions"
 
[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/proxy"
  status = 200
 
[[redirects]]
  from = "/api/proxy/*"
  to = "/.netlify/functions/proxy"
  status = 200
